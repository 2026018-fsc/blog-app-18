<!DOCTYPE html>
<html lang="ja" xmlns:th="http://www.thymeleaf.org">

<head th:replace="~{fragments/layout :: head('ブログ一覧')}">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blog detail</title>
    <link rel="stylesheet" href="/css/newstyle.css">
</head>



<body>
    <header th:replace="~{fragments/layout :: header('ブログ一覧')}"></header>
   <div class="title">
    <p ><span th:text="${blog.title}"></span></p>
    </div>
    
    <p class="name">著者名:<span th:text="${blog.authorName}"></span></p>
    <p><span th:text="${blog.notes}"></span></p>

    <form th:action="@{/blogs/{id}/delete(id=${blog.id})}" method="post">
        <button type="submit">削除</button>
    </form>

    <form th:action="@{/blogs/{id}/edit(id=${blog.id})}" method="get">
        <button type="submit">編集</button>
    </form>
    
</body>

</html>
