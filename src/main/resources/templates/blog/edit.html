<!DOCTYPE html>
<html lang="ja" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('ブログの編集')}"></head>


<body>
  <header th:replace="~{fragments/layout :: header('ブログ一覧')}"></header>
  <h1>ブログの編集</h1>
  <form th:action="@{/blogs/{id}/update(id=${blogId})}" method="post" th:object="${blogForm}">
    <label for="title">タイトル:</label>
    <input type="text" th:field="*{title}">
    <label for="authorName">著者名:</label>
    <input type="text" th:field="*{authorName}">
     <label for="notes">内容:</label>
    <input type="text" th:field="*{notes}">
    <button type="submit">更新</button>
  </form>
</body>
</html>
